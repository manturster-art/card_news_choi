<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>웹카드 생성기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 스크롤바 커스텀 */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background-color: rgba(255, 255, 255, 0.4);
    }

    .right-scrollbar::-webkit-scrollbar-thumb {
      background-color: #cbd5e1;
      border-radius: 10px;
    }

    .right-scrollbar::-webkit-scrollbar-thumb:hover {
      background-color: #94a3b8;
    }
  </style>
</head>

<body
  class="bg-[#e6ece9] font-sans text-gray-800 h-screen md:overflow-hidden flex flex-col selection:bg-[#0f5c40] selection:text-white">

  <!-- 전체 레이아웃 래퍼 -->
  <div
    class="flex flex-col md:flex-row flex-1 w-full h-full overflow-y-auto md:overflow-hidden md:p-8 md:gap-8 max-w-[1600px] mx-auto min-h-0">

    <!-- 좌측 폼 영역 (입력 패널) - 짙은 녹색 테마 -->
    <!-- 모바일: 위쪽에 배치되며 밑 부분만 둥글게, 데스크탑: 전체 둥글게 -->
    <aside
      class="w-full md:w-[420px] lg:w-[480px] bg-[#0f5c40] text-white rounded-b-[40px] md:rounded-[40px] shadow-[0_30px_60px_-15px_rgba(15,92,64,0.4)] md:h-full overflow-y-auto p-8 lg:p-10 shrink-0 flex flex-col custom-scrollbar z-10 relative md:min-h-0">

      <header class="mb-10 pb-2">
        <h1 class="text-3xl lg:text-4xl font-extrabold tracking-tight flex items-center gap-3">
          <div class="bg-white text-[#0f5c40] p-2 rounded-[1rem] shadow-sm">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
              </path>
            </svg>
          </div>
          웹카드 생성
        </h1>
        <p class="text-[#8bc9b3] mt-4 text-base font-medium leading-relaxed">준비된 사진과 세부 내용을 입력하여<br>웹카드를 손쉽게 완성해보세요.</p>
      </header>

      <section class="space-y-6 flex-1 pb-32 md:pb-8">

        <!-- Step 1: 이미지 첨부 그룹 -->
        <div class="bg-[#126b52] p-7 rounded-[2rem] border border-white/5 shadow-inner">
          <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-3">
            <span class="bg-white text-[#0f5c40] text-sm py-1.5 px-4 rounded-full shadow-sm tracking-wide">Step 1</span>
            사진 준비
          </h2>

          <div class="space-y-4 mb-8">
            <label class="block text-sm font-semibold text-[#a7d9c6] ml-2">상단 현장 사진</label>
            <div id="topDropZone"
              class="border-2 border-dashed border-[#5ca28b] bg-[#0f5c40]/30 rounded-[1.5rem] p-6 text-center hover:bg-white/10 hover:border-white transition-all duration-300 cursor-pointer group flex flex-col items-center justify-center min-h-[140px] relative">
              <button id="removeImageBtn"
                class="hidden absolute top-3 right-3 bg-red-500 hover:bg-red-600 text-white p-1.5 rounded-full shadow-md z-20 transition-all focus:outline-none">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12">
                  </path>
                </svg>
              </button>
              <div class="bg-white/20 p-4 rounded-full mb-4 group-hover:scale-110 transition-transform duration-300">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                  </path>
                </svg>
              </div>
              <p class="text-base text-white font-bold">클릭하거나 이미지 드래그</p>
              <input type="file" id="imageUpload" accept="image/*" class="hidden">
            </div>
            <p class="text-[12px] text-[#8bc9b3] font-medium mt-3 ml-2 flex gap-1 items-start">
              <span>💡</span> 우측 하얀 박스 위에서 드래그/휠로 사진 위치 조절이 가능합니다.
            </p>
          </div>

          <div class="space-y-4 mb-8">
            <label class="block text-sm font-semibold text-[#a7d9c6] ml-2">중단(타이틀) 배너 <span
                class="text-xs font-normal opacity-70 ml-1">(선택)</span></label>
            <div id="middleDropZone"
              class="border-2 border-dashed border-[#5ca28b] bg-[#0f5c40]/30 rounded-[1.5rem] p-5 text-center hover:bg-white/10 hover:border-white transition-all duration-300 cursor-pointer group flex flex-col items-center justify-center min-h-[100px] relative">
              <button id="removeMiddleBannerBtn"
                class="hidden absolute top-3 right-3 bg-red-500 hover:bg-red-600 text-white p-1.5 rounded-full shadow-md z-20 transition-all focus:outline-none">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12">
                  </path>
                </svg>
              </button>
              <p class="text-sm text-white font-bold mb-1">클릭 또는 이미지 업로드</p>
              <p class="text-[12px] text-[#a7d9c6]">올리지 않으면 기존 파란색 배너가 삽입됩니다</p>
              <input type="file" id="middleBannerUpload" accept="image/*" class="hidden">
            </div>
          </div>

          <div class="space-y-4">
            <label class="block text-sm font-semibold text-[#a7d9c6] ml-2">하단 배너 <span
                class="text-xs font-normal opacity-70 ml-1">(선택)</span></label>
            <div id="bottomDropZone"
              class="border-2 border-dashed border-[#5ca28b] bg-[#0f5c40]/30 rounded-[1.5rem] p-5 text-center hover:bg-white/10 hover:border-white transition-all duration-300 cursor-pointer group flex flex-col items-center justify-center min-h-[100px] relative">
              <button id="removeBottomBannerBtn"
                class="hidden absolute top-3 right-3 bg-red-500 hover:bg-red-600 text-white p-1.5 rounded-full shadow-md z-20 transition-all focus:outline-none">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12">
                  </path>
                </svg>
              </button>
              <p class="text-sm text-white font-bold mb-1">클릭 또는 이미지 업로드</p>
              <p class="text-[12px] text-[#a7d9c6]">올리지 않으면 기본 파란색 슬로건이 삽입됩니다</p>
              <input type="file" id="bottomBannerUpload" accept="image/*" class="hidden">
            </div>
          </div>
        </div>

        <!-- Step 2: 텍스트 정보 그룹 (White 대비) -->
        <div class="bg-white p-7 rounded-[2rem] shadow-[0_20px_40px_-15px_rgba(0,0,0,0.1)] text-gray-800">
          <h2 class="text-xl font-bold mb-6 flex items-center gap-3">
            <span class="bg-[#0f5c40] text-white text-sm py-1.5 px-4 rounded-full shadow-sm tracking-wide">Step 2</span>
            내용 작성
          </h2>

          <div class="space-y-6">
            <div>
              <label for="dateInput" class="block text-sm font-bold text-gray-700 mb-3 ml-2">행사 날짜</label>
              <input type="text" id="dateInput" placeholder="예: 3월 6일 금"
                class="w-full bg-[#f0f4f2] border-0 rounded-full px-6 py-4 text-sm focus:ring-4 focus:ring-[#0f5c40]/20 focus:bg-white focus:outline-none transition-all font-medium text-gray-800 placeholder-gray-400">
            </div>

            <div>
              <label for="scheduleInput" class="block text-sm font-bold text-gray-700 mb-3 ml-2">세부 일정 안내</label>
              <textarea id="scheduleInput" rows="4" placeholder="예:&#10;17:30 행사장 방문&#10;20:00 시민 간담회"
                class="w-full bg-[#f0f4f2] border-0 rounded-[1.5rem] px-6 py-5 text-sm focus:ring-4 focus:ring-[#0f5c40]/20 focus:bg-white focus:outline-none leading-relaxed transition-all font-medium text-gray-800 placeholder-gray-400"></textarea>
            </div>
          </div>
        </div>
      </section>

      <!-- 모바일 하단 플로팅 액션 버튼 그룹 (다운로드 & 보관함) -->
      <div class="md:hidden fixed bottom-6 left-6 right-6 z-20 flex gap-3">
        <button id="mobileDashboardBtn"
          class="bg-white text-[#0f5c40] font-bold py-4 px-5 rounded-full shadow-[0_15px_30px_-5px_rgba(0,0,0,0.2)] border border-gray-200 transition-transform active:scale-[0.98] flex justify-center items-center">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
            <path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z" />
          </svg>
        </button>
        <button id="mobileDownloadBtn"
          class="flex-1 bg-[#0f5c40] hover:bg-[#126b52] text-white font-bold py-4 px-6 rounded-full shadow-[0_15px_30px_-5px_rgba(15,92,64,0.4)] border-2 border-white/20 transition-transform active:scale-[0.98] text-lg flex justify-center items-center gap-2">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4-4m0 0l-4-4m4 4V4"></path>
          </svg>
          저장
        </button>
      </div>

    </aside>

    <!-- 우측 미리보기 영역 (메인 패널) -->
    <main
      class="flex-1 right-scrollbar md:h-full flex flex-col relative w-full overflow-hidden bg-[#f8faf9] md:rounded-[40px] md:shadow-[0_20px_60px_-15px_rgba(0,0,0,0.08)] md:min-h-0 md:border md:border-white/50">

      <!-- 데스크톱용 상단 액션바 (투명한 느낌, 대시보드 및 다운로드 버튼) -->
      <div class="hidden md:flex sticky top-0 z-10 p-4 pt-4 pb-6 justify-between items-center">
        <div class="px-4">
          <h2 class="text-3xl font-extrabold text-gray-800 tracking-tight">요약 미리보기</h2>
        </div>
        <div class="px-4 flex gap-4">
          <button id="dashboardBtn"
            class="bg-white text-gray-600 hover:text-[#0f5c40] hover:bg-gray-50 border border-gray-200 font-bold py-3.5 px-6 rounded-full shadow-lg shadow-gray-200/50 transition-all duration-300 active:scale-[0.97] text-sm flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
            보관함
          </button>
          <button id="downloadBtn"
            class="bg-white text-[#0f5c40] hover:bg-[#0f5c40] hover:text-white border border-[#0f5c40] font-bold py-3.5 px-8 rounded-full shadow-xl shadow-[#0f5c40]/10 transition-all duration-300 active:scale-[0.97] text-sm flex items-center gap-2">
            웹카드 다운로드
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3">
              </path>
            </svg>
          </button>
        </div>
      </div>

      <!-- 캔버스 컨테이너 -->
      <div class="flex-1 overflow-y-auto w-full flex justify-center px-6 md:px-0 py-10 pb-32 md:pb-12 right-scrollbar">
        <!-- 캔버스의 모서리 자체도 둥글게(오버플로우 숨김)하여 카드느낌 극대화 -->
        <div
          class="w-full max-w-[440px] lg:max-w-lg bg-white shadow-[0_25px_50px_-12px_rgba(0,0,0,0.15)] p-0 rounded-[40px] overflow-hidden flex justify-center h-fit ring-1 ring-gray-900/5">
          <canvas id="cardCanvas" width="1080" height="1400" class="w-full h-auto block"></canvas>
        </div>
      </div>

    </main>
  </div>

  <!-- 과거 작업 보관함(대시보드) 모달 -->
  <div id="dashboardModal"
    class="fixed inset-0 z-50 hidden bg-black/60 backdrop-blur-sm flex justify-center items-center p-4">
    <div
      class="bg-white w-full max-w-3xl h-[80vh] rounded-[2rem] shadow-2xl flex flex-col overflow-hidden relative transform transition-all">
      <!-- 모달 헤더 -->
      <div class="flex justify-between items-center p-6 border-b border-gray-100 bg-[#f8faf9]">
        <h2 class="text-2xl font-extrabold text-[#0f5c40] flex items-center gap-2">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path>
          </svg>
          내 작업 보관함
        </h2>
        <button id="closeModalBtn"
          class="text-gray-400 hover:text-red-500 bg-white hover:bg-red-50 p-2 rounded-full transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <!-- 모달 리스트 바디 -->
      <div id="historyListContainer"
        class="flex-1 overflow-y-auto p-6 md:p-8 right-scrollbar grid grid-cols-1 md:grid-cols-2 gap-6 bg-gray-50">
        <!-- JS를 통해 동적 생성되는 항목들 -->
      </div>
      <div id="emptyHistoryMsg"
        class="hidden absolute inset-0 flex flex-col items-center justify-center pointer-events-none mt-16">
        <svg class="w-16 h-16 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
          </path>
        </svg>
        <p class="text-gray-500 font-medium">아직 보관된 웹카드가 없습니다.</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
